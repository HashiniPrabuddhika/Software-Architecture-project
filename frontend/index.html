<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignment Submission Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Assignment Submission</h1>
    <p class="subtitle">Submit your assignment before the deadline</p>

    <form id="uploadForm">
      <label>Full Name</label>
      <input type="text" id="studentName" placeholder="e.g. Kamal Perera" required>

      <label>Student ID</label>
      <input type="text" id="studentId" placeholder="e.g. EG/2020/xxxx" required>

      <label>Assignment File (PDF, DOCX, or ZIP)</label>
      <input type="file" id="fileInput" accept=".pdf,.docx,.zip" required>

      <button type="submit">Submit Assignment</button>
    </form>

    <div id="statusMsg"></div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
